<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Simulador de humor interativo">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrador de Humor</title>

  <link rel="stylesheet" href="./style.css">

  <link rel="icon" href="https://twemoji.maxcdn.com/v/latest/72x72/1f603.png" type="image/png">
</head>

<body>
<main class="container">

  <h1>Como você está agora?</h1>
  <p id="texto">Escolha um humor abaixo 👇</p>

  <div class="botoes">
    <button data-humor="feliz">😃 Feliz</button>
    <button data-humor="triste">😢 Triste</button>
    <button data-humor="bravo">😡 Bravo</button>
    <button data-humor="neutro">😐 Neutro</button>
    <button data-humor="confiante">😎 Confiante</button>
    <button data-humor="ansioso">😰 Ansioso</button>
    <button data-humor="desmotivado">😔 Desmotivado</button>
    <button data-humor="cansado">😴 Cansado</button>
    <button data-humor="relaxado">🤗 Relaxado</button>
    <button data-humor="apaixonado">😍 Apaixonado</button>
    <button data-humor="desesperado">😭 Desesperado</button>
    <button data-humor="aliviado">😅 Aliviado</button>
    <button data-humor="pensativo">🤔 Pensativo</button>
    <button data-humor="nervoso">😬 Nervoso</button>
    <button data-humor="grato">😇 Grato</button>
    <button data-humor="brincalhao">😜 Brincalhão</button>
    <button data-humor="indeciso">😶 Indeciso</button>
    <button data-humor="assustado">😱 Assustado</button>
  </div>

  <h2>Histórico diário</h2>
  <div id="historyContainer"></div>

  <h2>Resumo da última semana</h2>
  <p id="summaryContainer"></p>

  <h2>Gráfico (últimos 7 dias)</h2>
  <div id="chart"></div>

</main>

<script src="./script.js"></script>
</body>
</html>
